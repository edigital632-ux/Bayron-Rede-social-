<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rede Social Byron</title>
  <!-- Tailwind CSS Oficial v4 -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { background-color: #f0f2f5; font-family: sans-serif; }
    .hidden { display: none; }
    .fb-shadow { box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1); }
    .pfp-placeholder { background-color: #1877f2; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 50%; overflow: hidden; }
  </style>
</head>
<body class="pb-20">

  <!-- TELA DE LOGIN / REGISTRO -->
  <div id="auth-page" class="min-h-screen flex flex-col lg:flex-row items-center justify-center p-6 gap-10 lg:gap-32 bg-[#f0f2f5]">
    <div class="max-w-md text-center lg:text-left">
      <h1 class="text-6xl font-bold text-[#1877f2] mb-4">Byron</h1>
      <p class="text-2xl font-medium text-gray-800 leading-tight">Conecte-se e compartilhe com as pessoas que fazem parte da sua vida na Rede Social Byron.</p>
    </div>
    
    <div class="bg-white p-6 rounded-xl shadow-xl w-full max-w-sm">
      <div class="space-y-4">
        <input type="email" id="email" placeholder="E-mail" class="w-full p-3 border border-gray-300 rounded-lg outline-none focus:border-blue-500 text-lg">
        <input type="password" id="password" placeholder="Senha (mínimo 6 caracteres)" class="w-full p-3 border border-gray-300 rounded-lg outline-none focus:border-blue-500 text-lg">
        
        <button id="btn-login" class="w-full bg-[#1877f2] text-white font-bold py-3 rounded-lg text-xl hover:bg-blue-700 transition shadow-md">Entrar</button>
        
        <hr>
        <div class="text-center pt-2">
          <button id="btn-registrar" class="bg-[#42b72a] text-white font-bold px-8 py-3 rounded-lg text-lg hover:bg-green-600 transition shadow-md">Criar nova conta</button>
        </div>
      </div>
    </div>
  </div>

  <!-- APP PRINCIPAL -->
  <div id="app-page" class="hidden">
    <nav class="bg-white h-14 flex items-center justify-between px-4 sticky top-0 z-50 fb-shadow">
      <div class="text-2xl font-bold text-[#1877f2]">Byron</div>
      <div class="flex items-center gap-4">
        <button id="btn-logout" class="bg-gray-200 px-4 py-1.5 rounded-lg font-bold text-sm hover:bg-gray-300">Sair</button>
      </div>
    </nav>

    <main class="max-w-xl mx-auto p-4 space-y-4">
      <!-- Caixa de Postagem -->
      <div class="bg-white p-4 rounded-xl fb-shadow">
        <div class="flex gap-3 mb-4">
          <div id="composer-pfp" class="w-10 h-10 pfp-placeholder text-lg shrink-0">?</div>
          <input type="text" id="post-text" placeholder="No que você está pensando?" class="bg-gray-100 rounded-full flex-1 px-4 outline-none hover:bg-gray-200">
        </div>
        <hr class="mb-3">
        <div class="flex justify-between items-center">
          <label class="cursor-pointer flex items-center gap-2 font-bold text-gray-500 hover:bg-gray-100 p-2 rounded-lg transition">
            📸 Foto <input type="file" id="post-file" class="hidden" accept="image/*">
          </label>
          <button id="btn-post" class="bg-[#1877f2] text-white px-8 py-1.5 rounded-lg font-bold hover:bg-blue-700 transition">Publicar</button>
        </div>
      </div>

      <!-- Feed -->
      <div id="feed-container" class="space-y-4"></div>
    </main>
  </div>

  <script type="module">
    // URLs validadas do Firebase SDK v10.7.1
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Suas credenciais do Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDLEUJmpOZUTDfhNbd8x5_B7ZDGHAo8CY0",
      authDomain: "bayron-rede-social.firebaseapp.com",
      projectId: "bayron-rede-social",
      storageBucket: "bayron-rede-social.appspot.com",
      messagingSenderId: "1056586043135",
      appId: "1:1056586043135:web:865582c617b4478142273d"
    };

    const IMGBB_KEY = "370b37d96c4eed4d111aec55b15cfa9a";
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let myProfile = null;

    // --- LÓGICA DE REGISTRO ---
    document.getElementById('btn-registrar').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      const btn = document.getElementById('btn-registrar');

      if (!email || pass.length < 6) {
        alert("Por favor, insira um e-mail válido e uma senha de no mínimo 6 caracteres.");
        return;
      }

      btn.innerText = "Criando conta...";
      btn.disabled = true;

      try {
        const res = await createUserWithEmailAndPassword(auth, email, pass);
        // Salva os dados do usuário no Firestore
        await setDoc(doc(db, "users", res.user.uid), {
          email: email,
          photoURL: null,
          uid: res.user.uid,
          createdAt: serverTimestamp()
        });
        alert("Conta criada com sucesso na Rede Social Byron!");
      } catch (err) {
        console.error("Erro no registro:", err);
        alert("Não foi possível criar a conta. Verifique se o método 'E-mail/Senha' está ativado no Firebase Console. Erro: " + err.message);
      } finally {
        btn.innerText = "Criar nova conta";
        btn.disabled = false;
      }
    });

    // --- LÓGICA DE LOGIN ---
    document.getElementById('btn-login').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (err) {
        alert("Erro no login: " + err.message);
      }
    });

    // --- LOGOUT ---
    document.getElementById('btn-logout').onclick = () => signOut(auth);

    // --- MONITOR DE ESTADO ---
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        document.getElementById('auth-page').classList.add('hidden');
        document.getElementById('app-page').classList.remove('hidden');
        const userDoc = await getDoc(doc(db, "users", user.uid));
        myProfile = userDoc.exists() ? userDoc.data() : { email: user.email };
        updateUI();
        loadFeed();
      } else {
        document.getElementById('auth-page').classList.remove('hidden');
        document.getElementById('app-page').classList.add('hidden');
      }
    });

    function updateUI() {
      const initial = myProfile.email[0].toUpperCase();
      const composerPfp = document.getElementById('composer-pfp');
      if (myProfile.photoURL) {
        composerPfp.innerHTML = `<img src="${myProfile.photoURL}" class="w-full h-full object-cover">`;
      } else {
        composerPfp.innerText = initial;
      }
    }

    // --- CARREGAR FEED ---
    function loadFeed() {
      const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
      onSnapshot(q, (snap) => {
        const container = document.getElementById('feed-container');
        container.innerHTML = '';
        snap.forEach(d => {
          const p = d.data();
          const avatar = p.authorPhoto ? `<img src="\({p.authorPhoto}" class="w-full h-full object-cover rounded-full">` : `<div class="w-full h-full pfp-placeholder">\){p.author[0].toUpperCase()}</div>`;
          
          container.innerHTML += `
            <div class="bg-white p-4 rounded-xl fb-shadow">
              <div class="flex items-center gap-3 mb-3">
                <div class="w-10 h-10">${avatar}</div>
                <div class="font-bold text-sm text-gray-800">${p.author.split('@')[0]}</div>
              </div>
              <div class="text-gray-800 mb-3">${p.text || ''}</div>
              \({p.image ? `<img src="\){p.image}" class="w-full rounded-lg shadow-sm">` : ''}
              <div class="flex border-t mt-3 pt-2 text-gray-500 font-bold text-sm">
                <button class="flex-1 py-2 hover:bg-gray-50 rounded-lg">👍 Curtir</button>
                <button class="flex-1 py-2 hover:bg-gray-50 rounded-lg">💬 Comentar</button>
              </div>
            </div>`;
        });
      });
    }

    // --- LÓGICA DE POSTAR ---
    document.getElementById('btn-post').onclick = async () => {
      const text = document.getElementById('post-text').value;
      const file = document.getElementById('post-file').files[0];
      const btn = document.getElementById('btn-post');
      if (!text && !file) return;

      btn.innerText = "...";
      btn.disabled = true;

      try {
        let imgUrl = null;
        if (file) {
          const fd = new FormData();
          fd.append("image", file);
          const res = await fetch("https://api.imgbb.com/1/upload?key=" + IMGBB_KEY, { method: "POST", body: fd });
          const json = await res.json();
          imgUrl = json.data.url;
        }
        await addDoc(collection(db, "posts"), {
          text: text,
          image: imgUrl,
          author: auth.currentUser.email,
          authorPhoto: myProfile.photoURL,
          timestamp: serverTimestamp()
        });
        document.getElementById('post-text').value = '';
        document.getElementById('post-file').value = '';
      } catch (err) {
        alert("Erro ao postar.");
      } finally {
        btn.innerText = "Publicar";
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
